- name: Disable swap
  command: swapoff -a

- name: Remove swap
  replace:
    path: /etc/fstab
    regexp: '^.*swap.*$'
    replace: ''

- name: Load kernel modules
  modprobe:
    name: "{{ item }}"
  loop:
    - overlay
    - br_netfilter

- name: Sysctl config
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables=1
      net.ipv4.ip_forward=1

- command: sysctl --system
