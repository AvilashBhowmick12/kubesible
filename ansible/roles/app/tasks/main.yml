- name: Deploy custom website
  command: kubectl create deployment nginx --image=hritamkar/vanillasite
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  ignore_errors: yes

- name: Expose nginx service
  command: kubectl expose deployment nginx --type=NodePort --port=80
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  ignore_errors: yes
