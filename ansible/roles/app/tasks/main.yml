---
- name: Copy nginx deployment manifest
  copy:
    src: nginx-deployment.yaml
    dest: /tmp/nginx-deployment.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Deploy custom website (idempotent)
  command: kubectl apply -f /tmp/nginx-deployment.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Expose nginx service (NodePort)
  command: kubectl expose deployment nginx --type=NodePort --port=80
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: expose_result
  failed_when: >
    expose_result.rc != 0 and
    'already exists' not in expose_result.stderr
